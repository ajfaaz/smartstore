{% extends 'inventory/base.html' %}

{% block content %}
<h1>⚙️ Management Dashboard</h1>

<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px;">
    <div class="card" style="text-align: center;">
        <h2>📦 Products</h2>
        <p>Manage your inventory items</p>
        <a href="/api/products/" style="text-decoration: none;">
            <button>View List</button>
        </a>
        <a href="/api/products/add/" style="text-decoration: none;">
            <button style="background: #3b82f6;">+ Add New Product</button>
        </a>
    </div>

    <div class="card" style="text-align: center;">
        <h2>👥 Staff</h2>
        <p>Manage system users and access</p>
        <a href="/api/staff/" style="text-decoration: none;">
            <button>View Staff List</button>
        </a>
        <a href="/api/staff/add/" style="text-decoration: none;">
            <button style="background: #3b82f6;">+ Add New Staff</button>
        </a>
    </div>

    <div class="card" style="text-align: center;">
        <h2>📈 Sales</h2>
        <p>Review transaction history</p>
        <a href="/api/sales/" style="text-decoration: none;">
            <button>View Sales History</button>
        </a>
    </div>
</div>

{% endblock %}
