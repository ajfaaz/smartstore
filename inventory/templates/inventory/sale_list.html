{% extends 'inventory/base.html' %}

{% block content %}
<style>
.table-wrap {
    overflow-x: auto;
}
@media (max-width: 900px) {
    h1 { font-size: 24px; margin: 8px 0; }
}
</style>

<h1>📈 Sales History</h1>

<div class="card">
    <div class="table-wrap">
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Date</th>
                <th>Staff</th>
                <th>Total</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for sale in sales %}
            <tr>
                <td>#{{ sale.id }}</td>
                <td>{{ sale.created_at|date:"Y-m-d H:i" }}</td>
                <td>{{ sale.staff.username|default:"Unknown" }}</td>
                <td>₦{{ sale.total_amount }}</td>
                <td><a href="/api/receipt/{{ sale.id }}/" target="_blank" style="color: #22c55e; text-decoration: none; font-weight: bold;">📄 PDF Receipt</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    </div>
</div>
{% endblock %}
