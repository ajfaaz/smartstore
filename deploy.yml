app:
  name: smartstore
  host: smartstore.arewanetventures.com
  deploy_branch: main

cpanel:
  app_path: "/home/<cpanel_user>/smartstore"
  python_path: "/home/<cpanel_user>/virtualenv/smartstore/3.11/bin/python"
  restart_file: "passenger_wsgi.py"

steps:
  - git fetch origin main
  - git checkout main
  - git pull --ff-only origin main
  - "${python_path} -m pip install -r requirements.txt"
  - "${python_path} manage.py migrate --noinput"
  - "${python_path} manage.py collectstatic --noinput"
  - "touch ${restart_file}"
